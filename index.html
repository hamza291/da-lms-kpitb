<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — DA Internship LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #cbd5e1;
    --text: #0f1729;
    --muted: #475569;
    --primary: #1e40af;
    --accent: #2563eb;
    --success: #15803d;
    --warning: #b45309;
    --danger: #b91c1c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    position: relative;
    padding: 20px;
  }
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(30,64,175,0.06) 0%, rgba(37,99,235,0.02) 50%, transparent 100%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    pointer-events: none;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    padding: 40px;
    z-index: 10;
    box-shadow: 0 10px 30px rgba(15,23,42,0.08);
    display: block;
  }
  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 40px;
    margin-bottom: 12px;
    display: inline-block;
  }
  .logo-area h2 {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .logo-area p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .input-wrapper {
    position: relative;
  }
  .form-control {
    width: 100%;
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    transition: all 0.2s;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(30,64,175,0.15);
    background: #ffffff;
  }
  .password-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .password-toggle:hover {
    color: var(--text);
  }
  .btn-submit {
    width: 100%;
    background: var(--primary);
    color: #ffffff;
    font-weight: 700;
    font-size: 14px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(30,64,175,0.25);
    background: var(--accent);
  }
  .btn-submit:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }
  .status-area {
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
    line-height: 1.5;
  }
  .status-error {
    background: rgba(185,28,28,0.05);
    border: 1px solid rgba(185,28,28,0.15);
    color: var(--danger);
  }
  .status-success {
    background: rgba(21,128,61,0.05);
    border: 1px solid rgba(21,128,61,0.15);
    color: var(--success);
  }
  .forgot-link {
    display: block;
    text-align: right;
    font-size: 12px;
    color: var(--primary);
    text-decoration: none;
    margin-top: 6px;
  }
  .forgot-link:hover {
    text-decoration: underline;
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
  }
  .footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }
  .footer a:hover {
    text-decoration: underline;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- 1. SIGN IN VIEW -->
<div class="card" id="signInCard">
  <div class="logo-area">
    <div class="logo-icon">📊</div>
    <h2>DA Internship LMS</h2>
    <p>KPITB · 2026</p>
  </div>

  <div class="status-area status-error" id="loginError"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Username or Email</label>
      <input type="text" id="email" class="form-control" placeholder="e.g. sohail.khan or email@example.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        <button type="button" class="password-toggle" onclick="togglePassVisibility('password')">Show</button>
      </div>
      <a href="#" class="forgot-link" onclick="switchView('forgotCard')">Forgot Password?</a>
    </div>
    <button type="submit" class="btn-submit" id="btnLoginSubmit">
      <span class="spinner" id="loginSpinner"></span>
      <span id="loginBtnText">Sign In</span>
    </button>
  </form>

  <div class="footer">
    Contact your administrator to get access.
  </div>
</div>

<!-- 2. FORGOT PASSWORD VIEW -->
<div class="card" id="forgotCard" style="display:none">
  <div class="logo-area">
    <div class="logo-icon">🔑</div>
    <h2>Reset Password</h2>
    <p>We'll email you a recovery link</p>
  </div>

  <div class="status-area status-error" id="forgotError"></div>
  <div class="status-area status-success" id="forgotSuccess"></div>

  <form id="forgotForm">
    <div class="form-group">
      <label for="forgotEmail">Email Address</label>
      <input type="email" id="forgotEmail" class="form-control" placeholder="name@example.com" required>
    </div>
    <button type="submit" class="btn-submit" id="btnForgotSubmit">
      <span class="spinner" id="forgotSpinner"></span>
      <span id="forgotBtnText">Send Reset Link</span>
    </button>
  </form>

  <div class="footer">
    <a href="#" onclick="switchView('signInCard')">← Back to Login</a>
  </div>
</div>

<!-- 3. PASSWORD RECOVERY / RESET PASSWORD VIEW -->
<div class="card" id="recoveryCard" style="display:none">
  <div class="logo-area">
    <div class="logo-icon">🛡️</div>
    <h2>New Password</h2>
    <p>Set a secure password for your account</p>
  </div>

  <div class="status-area status-error" id="recoveryError"></div>
  <div class="status-area status-success" id="recoverySuccess"></div>

  <form id="recoveryForm">
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <div class="input-wrapper">
        <input type="password" id="newPassword" class="form-control" placeholder="Min 6 characters" minlength="6" required>
        <button type="button" class="password-toggle" onclick="togglePassVisibility('newPassword')">Show</button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="btnRecoverySubmit">
      <span class="spinner" id="recoverySpinner"></span>
      <span id="recoveryBtnText">Update Password</span>
    </button>
  </form>

  <div class="footer">
    <a href="#" onclick="switchView('signInCard')">Go to Login</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://mrkpydwmdyiwqtjikhvb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_yABcWZTw5N3nht8NQm0wRQ_H4cZgOf0';

  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Check url hash for recovery redirect on load
  window.addEventListener('load', async () => {
    const hash = window.location.hash;
    
    // Check if recovery link
    if (hash && (hash.includes('type=recovery') || hash.includes('access_token='))) {
      switchView('recoveryCard');
      return;
    }

    // Otherwise check existing active session
    const { data: { session } } = await _sb.auth.getSession();
    if (session) {
      redirectUser(session.user.id);
    }
  });

  function switchView(viewId) {
    document.querySelectorAll('.card').forEach(el => el.style.display = 'none');
    document.getElementById(viewId).style.display = 'block';
  }

  function togglePassVisibility(inputId) {
    const input = document.getElementById(inputId);
    const btn = input.nextElementSibling;
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = 'Hide';
    } else {
      input.type = 'password';
      btn.textContent = 'Show';
    }
  }

  // 1. SIGN IN SUBMIT
  const loginForm = document.getElementById('loginForm');
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    let email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email.includes('@')) {
      email = email + '@lms.kpitb';
    }

    setLoading('btnLoginSubmit', 'loginSpinner', 'loginBtnText', 'Signing In...', true);
    document.getElementById('loginError').style.display = 'none';

    try {
      const { data, error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      redirectUser(data.user.id);
    } catch (err) {
      console.error('Login error:', err);
      let errMsg = err.message || 'Login failed. Please check your credentials.';
      
      // If error stringifies to empty object or fetch failure, print descriptive diagnostic
      const strErr = JSON.stringify(err);
      if (strErr === '{}' || errMsg.includes('Failed to fetch') || errMsg.includes('fetch')) {
        errMsg = 'Connection to database failed. Please ensure your Ad Blocker (e.g. AdBlocker by STANDS in your browser) is disabled for this site, as it blocks Supabase requests.';
      }
      
      showStatus('loginError', errMsg, 'error');
      setLoading('btnLoginSubmit', 'loginSpinner', 'loginBtnText', 'Sign In', false);
    }
  });

  // 2. FORGOT PASSWORD SUBMIT
  const forgotForm = document.getElementById('forgotForm');
  forgotForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('forgotEmail').value;

    setLoading('btnForgotSubmit', 'forgotSpinner', 'forgotBtnText', 'Sending...', true);
    document.getElementById('forgotError').style.display = 'none';
    document.getElementById('forgotSuccess').style.display = 'none';

    try {
      const { error } = await _sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.href // Redirect back to index.html with reset hash
      });
      if (error) throw error;
      showStatus('forgotSuccess', 'Reset link sent! Please check your email inbox.', 'success');
      document.getElementById('forgotEmail').value = '';
    } catch (err) {
      showStatus('forgotError', err.message || 'Failed to send reset link.', 'error');
    } finally {
      setLoading('btnForgotSubmit', 'forgotSpinner', 'forgotBtnText', 'Send Reset Link', false);
    }
  });

  // 3. RECOVERY FORM SUBMIT (Update password)
  const recoveryForm = document.getElementById('recoveryForm');
  recoveryForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPassword = document.getElementById('newPassword').value;

    setLoading('btnRecoverySubmit', 'recoverySpinner', 'recoveryBtnText', 'Updating...', true);
    document.getElementById('recoveryError').style.display = 'none';
    document.getElementById('recoverySuccess').style.display = 'none';

    try {
      const { error } = await _sb.auth.updateUser({ password: newPassword });
      if (error) throw error;
      showStatus('recoverySuccess', 'Password updated successfully! Redirecting...', 'success');
      
      // Auto signout and redirect to signin
      setTimeout(async () => {
        await _sb.auth.signOut();
        window.location.hash = '';
        window.location.reload();
      }, 2000);
    } catch (err) {
      showStatus('recoveryError', err.message || 'Failed to update password.', 'error');
      setLoading('btnRecoverySubmit', 'recoverySpinner', 'recoveryBtnText', 'Update Password', false);
    }
  });

  function setLoading(btnId, spinnerId, textId, text, isLoading) {
    const btn = document.getElementById(btnId);
    const spinner = document.getElementById(spinnerId);
    const txt = document.getElementById(textId);

    btn.disabled = isLoading;
    spinner.style.display = isLoading ? 'inline-block' : 'none';
    txt.textContent = text;
  }

  function showStatus(elemId, msg, type) {
    const el = document.getElementById(elemId);
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function redirectUser(userId) {
    const { data: profile, error } = await _sb
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single();

    if (error || !profile) {
      showStatus('loginError', 'Failed to fetch user profile. Make sure SQL was run.', 'error');
      setLoading('btnLoginSubmit', 'loginSpinner', 'loginBtnText', 'Sign In', false);
      return;
    }

    if (!profile.is_active) {
      showStatus('loginError', 'Your account has been deactivated.', 'error');
      setLoading('btnLoginSubmit', 'loginSpinner', 'loginBtnText', 'Sign In', false);
      return;
    }

    if (profile.role === 'admin') {
      window.location.href = './admin/index.html';
    } else {
      window.location.href = './intern/course.html';
    }
  }
</script>
</body>
</html>
