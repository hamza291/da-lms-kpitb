<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — DA Internship LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060918;
    --card: #0f1729;
    --border: #1e2d4a;
    --text: #e2e8f0;
    --muted: #64748b;
    --primary: #38bdf8;
    --accent: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Radial glow background */
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, rgba(167,139,250,0.05) 50%, transparent 100%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    pointer-events: none;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    padding: 40px;
    z-index: 10;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 40px;
    margin-bottom: 12px;
    display: inline-block;
  }
  .logo-area h2 {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .logo-area p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-control {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: 14px;
    transition: all 0.2s;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    background: rgba(255,255,255,0.05);
  }
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #000;
    font-weight: 700;
    font-size: 14px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(56,189,248,0.3);
  }
  .btn-submit:active {
    transform: translateY(0);
  }
  .error-area {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    color: #f87171;
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
    line-height: 1.5;
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
  }
  /* Loading spinner */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.1);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">📊</div>
    <h2>DA Internship LMS</h2>
    <p>KPITB · 2026</p>
  </div>

  <div class="error-area" id="errorMsg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit" id="btnSubmit">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Sign In</span>
    </button>
  </form>

  <div class="footer">
    Contact your administrator to get access.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── UPDATE THESE WITH YOUR SUPABASE KEYS ──
  const SUPABASE_URL = 'https://mrkpydwmdyiwqtjikhvb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_yABcWZTw5N3nht8NQm0wRQ_H4cZgOf0';

  let _sb = null;

  if (SUPABASE_URL !== 'YOUR_SUPABASE_URL_HERE') {
    _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }

  // Check if session exists and redirect
  window.addEventListener('load', async () => {
    if (!_sb) {
      showErr("Please set your SUPABASE_URL and SUPABASE_KEY at the top of this file's <script> tag to start.");
      return;
    }
    const { data: { session } } = await _sb.auth.getSession();
    if (session) {
      redirectUser(session.user.id);
    }
  });

  const form = document.getElementById('loginForm');
  const btnSubmit = document.getElementById('btnSubmit');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!_sb) return;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Loading State
    btnSubmit.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Signing In...';
    errorMsg.style.display = 'none';

    try {
      const { data, error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      redirectUser(data.user.id);
    } catch (err) {
      showErr(err.message || 'Login failed. Please check your credentials.');
      btnSubmit.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Sign In';
    }
  });

  function showErr(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  async function redirectUser(userId) {
    const { data: profile, error } = await _sb
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single();

    if (error || !profile) {
      showErr('Failed to fetch user profile. Make sure setup.sql was run in Supabase.');
      btnSubmit.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Sign In';
      return;
    }

    if (!profile.is_active) {
      showErr('Your account has been deactivated. Please contact the administrator.');
      btnSubmit.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Sign In';
      return;
    }

    if (profile.role === 'admin') {
      window.location.href = './admin/index.html';
    } else {
      window.location.href = './intern/course.html';
    }
  }
</script>
</body>
</html>
